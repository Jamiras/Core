name: C# CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, github-actions ]

jobs:
  Build-and-Tests:
    runs-on: windows-2025-vs2026 # TODO: change back to windows-latest after May 5 (see https://github.com/actions/runner-images/issues/13638)
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Install MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: msbuild.exe Jamiras.Core.sln -p:Configuration=Release -p:Platform="Any CPU"

    - name: Run Core Tests
      run: dotnet test Core\Tests\bin\Release\net10.0\Jamiras.Core.Tests.dll

    - name: Run UI.WPF Tests
      run: dotnet test UI\WPF\Tests\bin\Release\net10.0-windows\Jamiras.UI.WPF.Tests.dll
